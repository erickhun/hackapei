<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Hackapei bubble tea">
  <title>Hackapei — bubble tea</title>
  <rect width="32" height="32" rx="7" fill="#07060a"/>
  <!-- straw -->
  <line x1="17.7" y1="9.5" x2="22" y2="3.2" stroke="#ff3b6b" stroke-width="2.2" stroke-linecap="round"/>
  <!-- cup (milk tea) -->
  <path d="M9 12.6 H23 L20.6 28.4 Q20.5 29 19.9 29 H12.1 Q11.5 29 11.4 28.4 Z" fill="#e8d4b0"/>
  <!-- tea, lower -->
  <path d="M10.4 21 H21.6 L20.6 28.4 Q20.5 29 19.9 29 H12.1 Q11.5 29 11.4 28.4 Z" fill="#c98a4a"/>
  <!-- tapioca pearls -->
  <g fill="#241509">
    <circle cx="13.4" cy="26.3" r="1.5"/>
    <circle cx="16" cy="26.9" r="1.5"/>
    <circle cx="18.6" cy="26.3" r="1.5"/>
    <circle cx="14.7" cy="23.9" r="1.4"/>
    <circle cx="17.3" cy="23.9" r="1.4"/>
  </g>
  <!-- cup outline -->
  <path d="M9 12.6 H23 L20.6 28.4 Q20.5 29 19.9 29 H12.1 Q11.5 29 11.4 28.4 Z" fill="none" stroke="#ff3b6b" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- dome lid -->
  <path d="M8.2 12.6 C8.2 9.1 10.6 7.7 16 7.7 C21.4 7.7 23.8 9.1 23.8 12.6 Z" fill="#f3e6c8" stroke="#ff3b6b" stroke-width="1.3" stroke-linejoin="round"/>
</svg>
